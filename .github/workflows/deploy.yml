# .github/workflows/deploy.yml
name: Deploy Serverless App

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required to fetch the OIDC token
      contents: read    # Required for actions/checkout
    steps:
      - uses: actions/checkout@v7

      - name: Install the latest version of uv and set the python version
        uses: astral-sh/setup-uv@v8.2.0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || '369503741508' }}:role/automation/${{ vars.AWS_ROLE_NAME || 'github-actions' }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}
          role-duration-seconds: ${{ vars.ROLE_DURATION_SECONDS || '900' }}
          role-session-name: ${{ vars.ROLE_SESSION_NAME || 'GitHubActions' }}
          mask-aws-account-id: false
          output-credentials: true

      - name: Package Lambda function
        id: package
        run: |
          #!/usr/bin/env bash

          uv export --format requirements-txt --no-dev --no-header -o ./serverless/requirements.txt
          uv pip install --target ./serverless/ -r ./serverless/requirements.txt --link-mode=copy --python 3.12

      - uses: aws-actions/setup-sam@v3

      - run: sam build --use-container

      - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --template-file template-cognito.yaml
